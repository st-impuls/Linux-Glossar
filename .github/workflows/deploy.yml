name: Deploy MkDocs to GitHub Pages

# Bei jedem Push auf main automatisch bauen und veröffentlichen
on:
  push:
    branches:
      - main
  workflow_dispatch:        # erlaubt manuellen Start im Actions-Tab

# Rechte, die das offizielle Pages-Deployment braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Seite bauen
        run: mkdocs build --clean --strict

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
